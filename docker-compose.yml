x-mongo-shard-base: &mongo-shard-base
  build:
    context: ./mongo
  restart: always
  command: ["/usr/local/bin/init-shard.sh"]
  networks:
    - backend

x-kafka-common-env: &kafka-common-env
  KAFKA_PROCESS_ROLES: broker,controller
  KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
  KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
  KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
  KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka-1:9093,2@kafka-2:9093,3@kafka-3:9093
  KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
  KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 3
  KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 2
  KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
  CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk

x-kafka-base: &kafka-base
  image: confluentinc/cp-kafka:7.6.1
  networks:
    - backend

x-url-service-common-env: &url-service-common-env
  SPRING_MONGODB_URI: mongodb://appuser:apppass@mongo-router:27017/appdb?authSource=admin
  SPRING_DATA_REDIS_HOST: redis
  SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka-1:29092,kafka-2:29092,kafka-3:29092

x-url-service-base: &url-service-base
  build:
    context: .
    dockerfile: url-service/Dockerfile
  restart: always
  depends_on:
    mongo-router:
      condition: service_healthy
    mongo-setup:
      condition: service_completed_successfully
    redis:
      condition: service_started
    kafka-1:
      condition: service_started
    kafka-2:
      condition: service_started
    kafka-3:
      condition: service_started
  networks:
    - backend

services:

  mongo-config:
    build:
      context: ./mongo
    container_name: mongo-config
    hostname: mongo-config
    restart: always
    command: ["/usr/local/bin/init-configsvr.sh"]
    volumes:
      - mongo_config_data:/data/db
    networks:
      - backend

  mongo-shard1:
    <<: *mongo-shard-base
    container_name: mongo-shard1
    hostname: mongo-shard1
    environment:
      SHARD_REPLSET_NAME: shard1ReplSet
      SHARD_HOST: mongo-shard1
    volumes:
      - mongo_shard1_data:/data/db

  mongo-shard2:
    <<: *mongo-shard-base
    container_name: mongo-shard2
    hostname: mongo-shard2
    environment:
      SHARD_REPLSET_NAME: shard2ReplSet
      SHARD_HOST: mongo-shard2
    volumes:
      - mongo_shard2_data:/data/db

  mongo-shard3:
    <<: *mongo-shard-base
    container_name: mongo-shard3
    hostname: mongo-shard3
    environment:
      SHARD_REPLSET_NAME: shard3ReplSet
      SHARD_HOST: mongo-shard3
    volumes:
      - mongo_shard3_data:/data/db

  mongo-router:
    build:
      context: ./mongo
    container_name: mongo-router
    hostname: mongo-router
    restart: always
    command: ["mongos", "--configdb", "configReplSet/mongo-config:27017", "--keyFile", "/etc/mongo-keyfile", "--bind_ip_all", "--port", "27017"]
    depends_on:
      - mongo-config
      - mongo-shard1
      - mongo-shard2
      - mongo-shard3
    ports:
      - "27017:27017"
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 30
    networks:
      - backend

  mongo-setup:
    image: mongo:7
    container_name: mongo-setup
    restart: "no"
    depends_on:
      mongo-router:
        condition: service_healthy
    volumes:
      - ./mongo:/mongo-scripts:ro
    entrypoint: ["bash", "/mongo-scripts/wait-and-run-setup.sh"]
    networks:
      - backend

  redis:
    image: redis:7-alpine
    container_name: redis-cache
    restart: always
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    networks:
      - backend

  kafka-1:
    <<: *kafka-base
    hostname: kafka-1
    container_name: kafka-1
    ports:
      - "9092:9092"
    environment:
      <<: *kafka-common-env
      KAFKA_NODE_ID: 1
      KAFKA_LISTENERS: PLAINTEXT://kafka-1:29092,PLAINTEXT_HOST://0.0.0.0:9092,CONTROLLER://kafka-1:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka-1:29092,PLAINTEXT_HOST://localhost:9092
    volumes:
      - kafka_data_1:/var/lib/kafka/data

  kafka-2:
    <<: *kafka-base
    hostname: kafka-2
    container_name: kafka-2
    ports:
      - "9093:9092"
    environment:
      <<: *kafka-common-env
      KAFKA_NODE_ID: 2
      KAFKA_LISTENERS: PLAINTEXT://kafka-2:29092,PLAINTEXT_HOST://0.0.0.0:9092,CONTROLLER://kafka-2:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka-2:29092,PLAINTEXT_HOST://localhost:9093
    volumes:
      - kafka_data_2:/var/lib/kafka/data

  kafka-3:
    <<: *kafka-base
    hostname: kafka-3
    container_name: kafka-3
    ports:
      - "9094:9092"
    environment:
      <<: *kafka-common-env
      KAFKA_NODE_ID: 3
      KAFKA_LISTENERS: PLAINTEXT://kafka-3:29092,PLAINTEXT_HOST://0.0.0.0:9092,CONTROLLER://kafka-3:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka-3:29092,PLAINTEXT_HOST://localhost:9094
    volumes:
      - kafka_data_3:/var/lib/kafka/data

  url-service-1:
    <<: *url-service-base
    container_name: url-service-1
    ports:
      - "8081:8080"
    environment:
      <<: *url-service-common-env
      SNOWFLAKE_DATACENTER_ID: 0
      SNOWFLAKE_WORKER_ID: 0
      NODE_ID: url-service-1

  url-service-2:
    <<: *url-service-base
    container_name: url-service-2
    ports:
      - "8082:8080"
    environment:
      <<: *url-service-common-env
      SNOWFLAKE_DATACENTER_ID: 0
      SNOWFLAKE_WORKER_ID: 1
      NODE_ID: url-service-2

  url-service-3:
    <<: *url-service-base
    container_name: url-service-3
    ports:
      - "8083:8080"
    environment:
      <<: *url-service-common-env
      SNOWFLAKE_DATACENTER_ID: 1
      SNOWFLAKE_WORKER_ID: 0
      NODE_ID: url-service-3

  analytics-service:
    build:
      context: .
      dockerfile: analytics-service/Dockerfile
    restart: always
    deploy:
      replicas: 3
    depends_on:
      mongo-router:
        condition: service_healthy
      mongo-setup:
        condition: service_completed_successfully
      kafka-1:
        condition: service_started
      kafka-2:
        condition: service_started
      kafka-3:
        condition: service_started
    environment:
      SPRING_MONGODB_URI: mongodb://appuser:apppass@mongo-router:27017/appdb?authSource=admin
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka-1:29092,kafka-2:29092,kafka-3:29092
    networks:
      - backend

  nginx:
    image: nginx:1.27-alpine
    container_name: nginx-lb
    restart: always
    depends_on:
      - url-service-1
      - url-service-2
      - url-service-3
    ports:
      - "8080:8080"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - backend

volumes:
  mongo_config_data:
  mongo_shard1_data:
  mongo_shard2_data:
  mongo_shard3_data:
  redis_data:
  kafka_data_1:
  kafka_data_2:
  kafka_data_3:

networks:
  backend:
