spring.application.name=url-service

spring.mongodb.uri=mongodb://appuser:apppass@localhost:27017/appdb?authSource=admin

spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.timeout=2000

spring.kafka.bootstrap-servers=localhost:9092

snowflake.datacenter-id=${SNOWFLAKE_DATACENTER_ID:0}
snowflake.worker-id=${SNOWFLAKE_WORKER_ID:0}
snowflake.max-backward-drift-ms=${SNOWFLAKE_MAX_BACKWARD_DRIFT_MS:5}

bloomfilter.expected-insertions=${BLOOM_EXPECTED_INSERTIONS:1000000}
bloomfilter.false-positive-probability=${BLOOM_FALSE_POSITIVE_PROBABILITY:0.01}
bloomfilter.rebuild-interval-ms=${BLOOM_REBUILD_INTERVAL_MS:3600000}
bloomfilter.sync-group-id=${HOSTNAME:${random.uuid}}

cdn.default-max-age-seconds=${CDN_DEFAULT_MAX_AGE_SECONDS:86400}

node.id=${NODE_ID:local}
