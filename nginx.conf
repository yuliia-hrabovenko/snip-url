events {}

http {
    # $upstream_addr is the container:port that actually handled the request;
    # $upstream_http_x_node_id echoes back the app's own X-Node-Id response header -
    # together they make it obvious which node served each request without
    # needing to inspect each app container's logs individually.
    log_format upstream_log '$remote_addr - "$request" $status '
                             'upstream=$upstream_addr node=$upstream_http_x_node_id '
                             'rt=$request_time';

    access_log /dev/stdout upstream_log;

    upstream app_nodes {
        server url-service-1:8080;
        server url-service-2:8080;
        server url-service-3:8080;
    }

    server {
        listen 8080;

        location / {
            proxy_pass http://app_nodes;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
}
